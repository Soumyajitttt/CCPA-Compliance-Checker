version: "3.9"

services:
  ccpa-compliance:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env          # reads HF_TOKEN from your .env file automatically
    environment:
      - HF_TOKEN=${HF_TOKEN:-}   # also supports passing it directly in terminal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
